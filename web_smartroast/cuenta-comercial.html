<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRoast S.A.</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link  rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.97.3/js/materialize.min.js"></script>
    <script>
         $(document).ready(function() {
            $('select').material_select();
        });
    </script>
</head>

<body>
    <header class="brown darken-3">

        <nav class="brown darken-3 z-depth-0">
            <div class="nav-wrapper">
                <div class="container">
                    <a href="#" class="brand-logo"><img src="img/logo-smartroast.png" alt="SmartRoast S.A." class="logo"></a>

                    <ul id="nav-mobile" class="right hide-on-med-and-down">
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="precios.html">Precios</a></li>
                        <li><a href="cuenta-comercial.html">Cuenta Comercial</a></li>
                        <li class="telefono-nav">
                            <i class="material-icons left">phone</i>
                            03571-15539179
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    </header>

    <main>
        <section class="hero">
            <div class="container">
                <div class="row valign-wrapper">
                    <div class="col s12 m6"> 
                        <h1>
                            Solicitud de cuenta comercial
                        </h1>
                        <p>
                            Completá el formulario y nuestro equipo se pondrá en contacto con vos.
                        </p>

                    </div>

                    <div class="col s12 m6">
                    </div>

                </div>
            </div>
        </section>

        <section id="formulario" class="section">
            <div class="container">
                <form id="form-cuenta-comercial" novalidate>
                <div class="row">
                    
                    <div class="col s12 m6">
                        
                        <div class="input-field col s12">
                            <label class="active" for="pais">País *</label>
                            <select id="pais" required>
                                <option value="" disabled selected>Selecciona tu país</option>
                                <option value="Bolivia">Bolivia</option>
                                <option value="Paraguay">Paraguay</option>
                                <option value="Uruguay">Uruguay</option>
                            </select>
                        </div>

                        <div class="input-field col s12">
                            <label class="active" for="nombre_empresa">Nombre de empresa *</label>
                            <input id="nombre_empresa" type="text" placeholder="Ej. Café El Grano Dorado S.A." required>
                        </div>

                        <div class="input-field col s12">
                            <label class="active" for="tipo_negocio">Tipo de negocio *</label>
                            <select id="tipo_negocio" required>
                            <option value="" disabled selected>Selecciona el tipo de negocio</option>
                            <option value="Cafeteria">Cafetería / Tostaduría</option>
                            <option value="Horeca">Hotel / Restaurante / Catering</option>
                            <option value="Distribuidor">Distribuidor / Mayorista</option>
                            <option value="Oficina">Oficina / Corporativo</option>
                            <option value="Otro">Otro</option>
                            </select>
                        </div>

                            <div class="input-field col s12" id="contenedor-otro-negocio" style="display: none;">
                                <label class="active" for="otro_negocio">Especifica el tipo de negocio *</label>
                                <input id="otro_negocio" type="text" placeholder="Especifica tu tipo de negocio">
                            </div>

                        <div class="row">
                            <div class="col s12 center-align">
                            <button id="btn-submit" class="btn-large waves-effect waves-light" type="submit" disabled>
                                <i class="material-icons left">send</i>ENVIAR SOLICITUD
                                ENVIAR SOLICITUD
                            </button>
                            </div>
                        </div>

                    </div>

                    <div class="col s12 m6">
                        
                        <div class="input-field col s12">
                            <label class="active" for="correo">Correo electrónico *</label>
                            <input id="correo" type="email" placeholder="ejemplo@empresa.com" class="validate" required>
                            <span class="helper-text" data-error="Por favor, introduce un correo electrónico válido."></span>
                        </div>

                        <div class="input-field col s12">
                            <label class="active" for="volumen">Volumen mensual estimado (kg) *</label>
                            <input id="volumen" type="number" min="1" max="15000" step="1" placeholder="Ej. 3000" class="validate" required>
                            <span class="helper-text" data-error="El valor debe estar entre 1 y 15000."></span>
                        </div>

                        <div class="input-field col s12">
                            <label class="active" for="info_adicional">Información adicional</label>
                            <textarea id="info_adicional" class="materialize-textarea" placeholder="Escribe aquí detalles adicionales, preguntas o requerimientos especiales..."></textarea>
                        </div>
                    </div>

                </div>

                </form>
            </div>
        </section>

    </main>
</body>
</html>
